# ============================================
# Shop Inventory - Docker Compose
# ============================================
# Usage:
#   Start:   docker compose up
#   Stop:    docker compose down
#   Rebuild: docker compose up --build
#   Reset DB: docker compose down -v  (deletes all data!)
# ============================================

services:
  # ---- PostgreSQL Database ----
  db:
    image: postgres:16-alpine
    container_name: shop-inventory-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: shop_inventory
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ---- Next.js Application ----
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: shop-inventory-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # Database (connects to the 'db' service above)
      DATABASE_URL: postgresql://postgres:postgres123@db:5432/shop_inventory?schema=public

      # NextAuth
      AUTH_SECRET: ${AUTH_SECRET:-change-me-in-production}
      AUTH_URL: http://localhost:3000

      # Supabase (for file storage - keep using cloud)
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}

      # AI
      GROQ_API_KEY: ${GROQ_API_KEY}
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
    driver: local
