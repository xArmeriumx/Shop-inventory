name: CI Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Lint Check
        run: npm run lint

      - name: Type Check (Build)
        run: npm run build
        env:
          # Dummy vars for build time static generation check
          DATABASE_URL: "mysql://dummy:dummy@localhost:3306/dummy"
          AUTH_SECRET: "dummy-secret"
